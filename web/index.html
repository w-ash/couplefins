<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var stored = null;
        try { stored = localStorage.getItem('couplefins:theme'); } catch(e) {}
        var theme = (stored === 'light' || stored === 'dark' || stored === 'system') ? stored : 'system';
        var isDark = theme === 'dark' ||
          (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Couplefins</title>
    <meta name="description" content="Shared finance reconciliation for couples" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8f7f5" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#2c2a28" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=satoshi@1,2&display=swap"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
